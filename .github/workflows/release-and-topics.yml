name: Create v1.0.0 Release, Add Topics & Close Stale PR

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print what would happen, do nothing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create tags, releases
      pull-requests: write     # close stale PR
      issues: write            # allow commenting on PRs/issues
      administration: write    # update repository topics
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ── 1. Add repository topics ────────────────────────────────────────────
      - name: Add repository topics
        if: inputs.dry_run == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/topics \
            -f 'names[]=github-actions' \
            -f 'names[]=security' \
            -f 'names[]=security-scanning' \
            -f 'names[]=sast' \
            -f 'names[]=sca' \
            -f 'names[]=dast' \
            -f 'names[]=infrastructure-as-code' \
            -f 'names[]=github-security' \
            -f 'names[]=ci-cd' \
            -f 'names[]=workflow-templates' \
            -f 'names[]=open-source'
          echo "✅ Topics added"

      - name: Dry-run — print topics
        if: inputs.dry_run == 'true'
        run: |
          echo "Would add topics: github-actions security security-scanning sast sca dast infrastructure-as-code github-security ci-cd workflow-templates open-source"

      # ── 2. Create release v1.0.0 (this triggers npm-publish.yml) ───────────
      - name: Create GitHub Release v1.0.0
        if: inputs.dry_run == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view v1.0.0 --repo ${{ github.repository }} >/dev/null 2>&1 && { echo "Release v1.0.0 already exists — skipping"; exit 0; }
          gh release create v1.0.0 \
            --title "GrowKudos v1.0.0 - Professional Security Scanning Workflows" \
            --notes "## 🎉 GrowKudos v1.0.0 — First Stable Release

GrowKudos is a curated collection of production-ready GitHub Actions security-scanning workflow templates, packaged as an installable npm module so teams can query, copy, and automate their DevSecOps setup.

---

### 📦 npm Package

Install from GitHub Packages:

\`\`\`bash
# Authenticate once
npm login --scope=@jvzhu --auth-type=legacy --registry=https://npm.pkg.github.com

# Install
npm install @jvzhu/growkudos
\`\`\`

