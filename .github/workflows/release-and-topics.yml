### 🚀 Getting Started

👉 **[Read GETTING_STARTED.md](https://github.com/jvzhu/GrowKudos/blob/main/GETTING_STARTED.md)**

**Option 1 — copy a single workflow:**

1. Browse [.github/workflows/](https://github.com/jvzhu/GrowKudos/tree/main/.github/workflows)
2. Pick a tool (e.g. \`semgrep.yml\`)
3. Copy it into your repo's \`.github/workflows/\` directory

**Option 2 — use the npm package:**

\`\`\`js
const growkudos = require('@jvzhu/growkudos');

// List all 35+ workflow IDs
growkudos.listWorkflows();

// Get all free SAST tools
growkudos.getWorkflowsByCategory('sast');

// Copy Semgrep workflow into your project
const fs = require('fs');
fs.writeFileSync('.github/workflows/semgrep.yml', growkudos.getWorkflowContent('semgrep'));
\`\`\`

