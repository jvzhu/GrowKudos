            --target main
          echo "✅ Release v1.0.0 created — npm-publish.yml will now trigger automatically"

      - name: Dry-run — print release info
        if: inputs.dry_run == 'true'
        run: |
          echo "Would create release v1.0.0 on main branch"
          echo "Title: GrowKudos v1.0.0 - Professional Security Scanning Workflows"
          echo "This would trigger npm-publish.yml automatically"

      # ── 3. Close stale PR #1 (superseded by PR #2 which merged all content) ─
      - name: Close stale PR #1
        if: inputs.dry_run == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_STATE=$(gh pr view 1 --repo ${{ github.repository }} --json state -q '.state' 2>/dev/null || echo "not_found")
          if [ "$PR_STATE" = "OPEN" ]; then
            gh pr close 1 \
              --repo ${{ github.repository }} \
              --comment "Closing as superseded by PR #2, which merged all documentation content into main."
            echo "✅ PR #1 closed"
          else
            echo "ℹ️ PR #1 is already $PR_STATE — nothing to do"
          fi

      - name: Dry-run — print PR status
        if: inputs.dry_run == 'true'
        run: |
          echo "Would close PR #1 with 'superseded by PR #2' comment"

      # ── 4. Summary ──────────────────────────────────────────────────────────
      - name: Print summary
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "=== DRY RUN COMPLETE — no changes made ==="
          else
            echo ""
            echo "=== GrowKudos Publishing Pipeline Complete ==="
            echo "✅ Repository topics set (11 topics)"
            echo "✅ GitHub Release v1.0.0 created"
            echo "✅   → npm-publish.yml triggered automatically"
            echo "✅ PR #1 closed as superseded"
            echo ""
            echo "Check package at: https://github.com/jvzhu/GrowKudos/packages"
            echo "Check release at: https://github.com/jvzhu/GrowKudos/releases/tag/v1.0.0"
          fi
