name: Publish npm Package to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave blank to use package.json version)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@jvzhu'

      - name: Bump version (manual trigger only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Verify package contents
        run: |
          echo "Package name: $(node -p "require('./package.json').name")"
          echo "Package version: $(node -p "require('./package.json').version")"
          echo "Workflow files:"
          ls .github/workflows/

      - name: Run basic smoke test
        run: node -e "const g = require('.'); console.log('Workflows loaded:', g.listWorkflows().length);"

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
